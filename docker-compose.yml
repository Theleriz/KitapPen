services:

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file: backend/.env
    environment:
      - DEBUG=1
      - ALLOWED_HOSTS=* localhost 127.0.0.1 backend
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      minio:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "4200:4200"
    depends_on:
      - backend

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  cron:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - ./backend:/app
    env_file: backend/.env
    environment:
      - ALLOWED_HOSTS=*
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      - backend
    restart: on-failure
    command: >
      sh -c "while true; do
        python manage.py send_reading_reminders;
        sleep 3600;
      done"

volumes:
  minio_data:
