services:

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file: backend/.env
    environment:
      - DEBUG=1
    depends_on:
      - minio

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "4200:4200"
    depends_on:
      - backend

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    env_file: backend/.env

  cron:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - ./backend:/app
    env_file: backend/.env
    depends_on:
      - backend
    command: >
      sh -c "while true; do
        python manage.py send_reading_reminders;
        sleep 3600;
      done"

volumes:
  minio_data:
