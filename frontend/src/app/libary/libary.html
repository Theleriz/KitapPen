<div class="library-page">

  <header class="library-header">
    <div class="library-header__top">
      <div>
        <h1 class="library-title">Library</h1>
        <span class="library-subtitle">Browse all available books</span>
      </div>
      <div class="search-bar">
        <span class="search-bar__icon">🔍</span>
        <input
          type="text"
          class="search-bar__input"
          placeholder="Search by title or author…"
          [(ngModel)]="searchQuery"
        />
      </div>
    </div>
  </header>

  <!-- Books grid -->
  @if (filteredBooks.length > 0) {
    <div class="books-grid">
      @for (book of filteredBooks; track book.id) {
        <div class="book-card">
          <div class="book-card__cover">
            <span class="book-card__cover-letter">{{ book.title[0] }}</span>
          </div>
          <div class="book-card__body">
            <h3 class="book-card__title">{{ book.title }}</h3>
            <p class="book-card__author">{{ book.author }}</p>
            <div class="book-card__meta">
              <span class="book-card__pages">{{ book.pages }} pages</span>
            </div>
          </div>
          <div class="book-card__actions">
            <button class="btn-read">Read</button>
            <button class="btn-add">+ Add to my library</button>
          </div>
        </div>
      }
    </div>
  }

  @if (filteredBooks.length === 0) {
    <div class="empty-state">
      <span class="empty-state__icon">📚</span>
      <p>No books found.<br>Try a different search query.</p>
    </div>
  }

</div>
