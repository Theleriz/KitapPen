$kind: http-request
method: PATCH
url: '{{baseUrl}}/notes/:noteId/'
order: 5000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{accessToken}}'
pathVariables:
  - key: noteId
    value: '{{noteId}}'
body:
  type: json
  content: |-
    {
      "content": "Updated note content.",
      "page_number": 43
    }
